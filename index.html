<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-touch-fullscreen" content="yes">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

<meta name="robots" content="noindex, nofollow">

<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="ikona.png">

<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400&family=Montserrat:wght@400&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

<style>
  body {
    margin: 0;
    padding: 0;
    background: #FFFFFF;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
    display: flex;
    flex-direction: column;
  }

  /* UPRAVENÁ LIŠTA - rozměry v cm a mm */
  .top-bar {
    background: #120F1D;
    color: white;
    display: flex;
    align-items: center;
    padding: 12px 15px; /* Vnitřní prostor lišty */
    border-radius: 8px; /* Zaoblené okraje */
    
    /* Vzdálenosti podle vašeho měření */
    margin-top: calc(1.1cm + env(safe-area-inset-top, 0px)); /* 1,1 cm zvrchu (+ ošetření výřezu) */
    margin-left: 3.5mm; /* 3,5 mm zleva */
    margin-right: 3.5mm; /* 3,5 mm zprava */
    margin-bottom: 6mm; /* 6 mm mezera mezi lištou a GIFem */
    
    box-sizing: border-box;
  }

  .back-arrow {
    margin-right: 14px;
    display: flex;
    align-items: center;
  }

  .material-icons {
    font-size: 24px;
    color: white;
  }

  .status {
    display: flex;
    align-items: center;
    font-family: 'Roboto', sans-serif;
    font-weight: 400;
    font-size: 14px;
  }

  .dot {
    width: 12px;
    height: 12px;
    background: #008001;
    border-radius: 50%;
    margin-right: 8px;
  }

  .time {
    margin-left: auto;
    white-space: nowrap;
    font-family: 'Montserrat', sans-serif;
    font-weight: 400; 
    font-size: 15px; 
    font-variant-numeric: proportional-nums;
    font-feature-settings: "tnum" 0, "kern" 0;
  }

  .dash {
    display: inline-block;
    transform: scaleX(1.5);
    margin: 0 2px;
  }

  .separator {
    margin: 0 6px;
    font-weight: 400;
  }

  /* UPRAVENÝ PROSTOR PRO GIF - od kraje přesně 3,5 mm */
  .main-content {
    flex-grow: 1;
    display: flex;
    justify-content: center;
    align-items: flex-start; /* GIF se přimáčkne nahoru k té 6mm mezeře */
    
    /* Vzdálenosti zleva a zprava */
    padding-left: 3.5mm;
    padding-right: 3.5mm;
    box-sizing: border-box;
    width: 100%;
  }
  
  .main-content img {
    width: 100%; /* Natáhne se na max. šířku minus těch 3,5 mm z každé strany */
    max-height: 75vh;
    object-fit: contain; /* Zabrání oříznutí nebo deformaci obrázku */
    border-radius: 15px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1); 
  }

  /* SPODNÍ TLAČÍTKO */
  .bottom-bar {
    display: flex;
    justify-content: center;
    padding-bottom: 25px; 
  }
  
  .bottom-bar img {
    height: 80px; 
    cursor: pointer;
  }
</style>
</head>
<body onclick="requestFullScreen()">

<div class="top-bar">
  <div class="back-arrow">
    <span class="material-icons">arrow_back</span>
  </div>

  <div class="status">
    <div class="dot"></div>
    PLATNÝ
  </div>

  <div class="time" id="clock"></div>
</div>

<div class="main-content">
  <img src="karta.gif" alt="Průkaz">
</div>

<div class="bottom-bar">
  <a href="#">
    <img src="tlacitko.png" alt="Otočit kartu">
  </a>
</div>

<script>
  function requestFullScreen() {
    var el = document.documentElement;
    var rfs = el.requestFullscreen || el.webkitRequestFullScreen || el.mozRequestFullScreen || el.msRequestFullscreen;
    if(typeof rfs!="undefined" && rfs){
      rfs.call(el);
    }
  }

  function updateClock() {
    const now = new Date();
    const day = String(now.getDate()).padStart(2, '0');
    const month = String(now.getMonth() + 1).padStart(2, '0');
    const year = now.getFullYear();
    const hours = String(now.getHours()).padStart(2, '0');
    const minutes = String(now.getMinutes()).padStart(2, '0');
    const seconds = String(now.getSeconds()).padStart(2, '0');

    const clockElement = document.getElementById("clock");
    if (clockElement) {
      const d = '<span class="dash">-</span>';
      clockElement.innerHTML = day + d + month + d + year + '<span class="separator">|</span>' + hours + ":" + minutes + ":" + seconds;
    }
  }

  updateClock(); 
  setInterval(updateClock, 1000); 
</script>

</body>
</html>
