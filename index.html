<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-touch-fullscreen" content="yes">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

<meta name="theme-color" content="#FFFFFF">
<meta name="robots" content="noindex, nofollow">

<title>Alive App</title>

<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="ikona.png">

<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400&family=Montserrat:wght@400&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

<style>
  body {
    margin: 0;
    padding-top: env(safe-area-inset-top, 0px);
    background: #FFFFFF;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
    display: flex;
    flex-direction: column;
    box-sizing: border-box;
  }

  /* ČERNÁ LIŠTA S DATEM */
  .top-bar {
    background: #120F1D;
    color: white;
    display: flex;
    align-items: center;
    padding: 12px 15px;
    border-radius: 8px; 
    
    border: none !important;
    box-shadow: none !important;
    
    margin-top: 0.9cm; 
    margin-left: 18px; 
    margin-right: 18px; 
    margin-bottom: 28px; 
    
    box-sizing: border-box;
  }

  .back-arrow {
    margin-right: 14px;
    display: flex;
    align-items: center;
  }

  .material-icons {
    font-size: 24px;
    color: white;
  }

  .status {
    display: flex;
    align-items: center;
    font-family: 'Roboto', sans-serif;
    font-weight: 400;
    font-size: 14px;
  }

  .dot {
    width: 12px;
    height: 12px;
    background: #008001;
    border-radius: 50%;
    margin-right: 8px;
  }

  .time {
    margin-left: auto;
    white-space: nowrap;
    font-family: 'Montserrat', sans-serif;
    font-weight: 400; 
    font-size: 15px; 
    font-variant-numeric: proportional-nums;
    font-feature-settings: "tnum" 0, "kern" 0;
  }

  .dash {
    display: inline-block;
    transform: scaleX(1.5);
    margin: 0 2px;
  }

  .separator {
    margin: 0 6px;
    font-weight: 400;
  }

  /* PROSTOR PRO GIF KARTU */
  .main-content {
    flex-grow: 1;
    display: flex;
    justify-content: center;
    align-items: flex-start; 
    
    padding-left: 18px;
    padding-right: 18px;
    box-sizing: border-box;
    width: 100%;
  }
  
  .main-content img {
    width: 100%; 
    height: auto; 
    border-radius: 15px;
  }

  /* SPODNÍ OBRÁZEK TLAČÍTKA */
  .bottom-bar {
    display: flex;
    justify-content: center;
    padding-bottom: 30px; 
    background: #FFFFFF;
    width: 100%;
  }
  
  .bottom-bar img {
    height: 75px; 
    width: auto;
  }
</style>
</head>
<body>

<div class="top-bar">
  <div class="back-arrow">
    <span class="material-icons">arrow_back</span>
  </div>

  <div class="status">
    <div class="dot"></div>
    PLATNÝ
  </div>

  <div class="time" id="clock"></div>
</div>

<div class="main-content">
  <img src="karta.gif" alt="Průkaz">
</div>

<div class="bottom-bar">
  <img src="tlacitko.png" alt="Menu">
</div>

<script>
  // Kód pro běžící hodiny
  function updateClock() {
    const now = new Date();
    const day = String(now.getDate()).padStart(2, '0');
    const month = String(now.getMonth() + 1).padStart(2, '0');
    const year = now.getFullYear();
    const hours = String(now.getHours()).padStart(2, '0');
    const minutes = String(now.getMinutes()).padStart(2, '0');
    const seconds = String(now.getSeconds()).padStart(2, '0');

    const clockElement = document.getElementById("clock");
    if (clockElement) {
      const d = '<span class="dash">-</span>';
      clockElement.innerHTML = day + d + month + d + year + '<span class="separator">|</span>' + hours + ":" + minutes + ":" + seconds;
    }
  }

  updateClock(); 
  setInterval(updateClock, 1000); 

  // Kód, který aktivuje offline režim
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js')
        .then(registration => {
          console.log('Offline režim je aktivní!');
        })
        .catch(err => {
          console.log('Chyba offline režimu: ', err);
        });
    });
  }
</script>

</body>
</html>
