<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-touch-fullscreen" content="yes">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

<meta name="robots" content="noindex, nofollow">

<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="ikona.png">

<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400&family=Montserrat:wght@400&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

<style>
  body {
    margin: 0;
    /* Ošetření výřezu (notche) - vytvoří nahoře bílé místo, pod které se posune zbytek */
    padding-top: env(safe-area-inset-top, 0px);
    background: #FFFFFF; /* Čisté bílé pozadí celé stránky i kolem notche */
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
    display: flex;
    flex-direction: column;
    box-sizing: border-box;
  }

  /* LIŠTA - rozměry v cm a mm */
  .top-bar {
    background: #120F1D;
    color: white;
    display: flex;
    align-items: center;
    padding: 12px 15px;
    border-radius: 8px; /* Zaoblené rohy lišty */
    
    /* Přesné vzdálenosti od okrajů */
    margin-top: 1.1cm; /* 1,1 cm shora (od konce notche) */
    margin-left: 3.5mm; /* 3,5 mm zleva */
    margin-right: 3.5mm; /* 3,5 mm zprava */
    margin-bottom: 6mm; /* 6 mm mezera mezi lištou a GIFem */
    
    box-sizing: border-box;
  }

  .back-arrow {
    margin-right: 14px;
    display: flex;
    align-items: center;
  }

  .material-icons {
    font-size: 24px;
    color: white;
  }

  .status {
    display: flex;
    align-items: center;
    font-family: 'Roboto', sans-serif;
    font-weight: 400;
    font-size: 14px;
  }

  .dot {
    width: 12px;
    height: 12px;
    background: #008001;
    border-radius: 50%;
    margin-right: 8px;
  }

  .time {
    margin-left: auto;
    white-space: nowrap;
    font-family: 'Montserrat', sans-serif;
    font-weight: 400; 
    font-size: 15px; 
    font-variant-numeric: proportional-nums;
    font-feature-settings: "tnum" 0, "kern" 0;
  }

  .dash {
    display: inline-block;
    transform: scaleX(1.5);
    margin: 0 2px;
  }

  .separator {
    margin: 0 6px;
    font-weight: 400;
  }

  /* PROSTOR PRO GIF - Karta bez stínů roztažená k okrajům */
  .main-content {
    flex-grow: 1;
    display: flex;
    justify-content: center;
    align-items: flex-start; /* GIF je přitisknutý k horní 6mm mezeře */
    
    /* Vzdálenosti zleva a zprava - PŘESNĚ 3.5mm */
    padding-left: 3.5mm;
    padding-right: 3.5mm;
    box-sizing: border-box;
    width: 100%;
  }
  
  .main-content img {
    width: 100%; /* Roztáhne kartu přesně na šířku lišty */
    height: auto;
    max-height: 70vh; /* Omezení výšky, aby zbylo místo na tlačítko dole */
    object-fit: contain;
    border-radius: 15px;
  }

  /* SPODNÍ OBRÁZKOVÉ TLAČÍTKO */
  .bottom-bar {
    display: flex;
    justify-content: center;
    padding-bottom: 35px; /* Dostatečné odsazení od úplného spodku displeje */
  }
  
  .bottom-bar img {
    height: 60px; /* Výšku si upravte, aby odpovídala originálu */
    width: auto;
    cursor: pointer;
  }
</style>
</head>
<body onclick="requestFullScreen()">

<div class="top-bar">
  <div class="back-arrow">
    <span class="material-icons">arrow_back</span>
  </div>

  <div class="status">
    <div class="dot"></div>
    PLATNÝ
  </div>

  <div class="time" id="clock"></div>
</div>

<div class="main-content">
  <img src="karta.gif" alt="Průkaz">
</div>

<div class="bottom-bar">
  <a href="#">
    <img src="tlacitko.png" alt="Tlačítko menu">
  </a>
</div>

<script>
  function requestFullScreen() {
    var el = document.documentElement;
    var rfs = el.requestFullscreen || el.webkitRequestFullScreen || el.mozRequestFullScreen || el.msRequestFullscreen;
    if(typeof rfs!="undefined" && rfs){
      rfs.call(el);
    }
  }

  function updateClock() {
    const now = new Date();
    const day = String(now.getDate()).padStart(2, '0');
    const month = String(now.getMonth() + 1).padStart(2, '0');
    const year = now.getFullYear();
    const hours = String(now.getHours()).padStart(2, '0');
    const minutes = String(now.getMinutes()).padStart(2, '0');
    const seconds = String(now.getSeconds()).padStart(2, '0');

    const clockElement = document.getElementById("clock");
    if (clockElement) {
      const d = '<span class="dash">-</span>';
      clockElement.innerHTML = day + d + month + d + year + '<span class="separator">|</span>' + hours + ":" + minutes + ":" + seconds;
    }
  }

  updateClock(); 
  setInterval(updateClock, 1000); 
</script>

</body>
</html>
