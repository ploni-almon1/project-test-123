<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-touch-fullscreen" content="yes">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

<meta name="theme-color" content="#FFFFFF">
<meta name="robots" content="noindex, nofollow">

<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="ikona.png">

<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400&family=Montserrat:wght@400&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

<style>
  body {
    margin: 0;
    padding-top: env(safe-area-inset-top, 0px);
    background: #FFFFFF;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
    display: flex;
    flex-direction: column;
    box-sizing: border-box;
  }

  /* ČERNÁ LIŠTA S DATEM */
  .top-bar {
    background: #120F1D;
    color: white;
    display: flex;
    align-items: center;
    padding: 12px 15px;
    border-radius: 8px;
    
    margin-top: 1.1cm;
    margin-left: 3.5mm;
    margin-right: 3.5mm;
    margin-bottom: 6mm;
    
    box-sizing: border-box;
  }

  .back-arrow {
    margin-right: 14px;
    display: flex;
    align-items: center;
  }

  .material-icons {
    font-size: 24px;
    color: white;
  }

  .status {
    display: flex;
    align-items: center;
    font-family: 'Roboto', sans-serif;
    font-weight: 400;
    font-size: 14px;
  }

  .dot {
    width: 12px;
    height: 12px;
    background: #008001;
    border-radius: 50%;
    margin-right: 8px;
  }

  .time {
    margin-left: auto;
    white-space: nowrap;
    font-family: 'Montserrat', sans-serif;
    font-weight: 400; 
    font-size: 15px; 
    font-variant-numeric: proportional-nums;
    font-feature-settings: "tnum" 0, "kern" 0;
  }

  .dash {
    display: inline-block;
    transform: scaleX(1.5);
    margin: 0 2px;
  }

  .separator {
    margin: 0 6px;
    font-weight: 400;
  }

  /* UPRAVENÝ PROSTOR PRO GIF KARTU */
  .main-content {
    flex-grow: 1;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    width: 100%;
  }
  
  .main-content img {
    /* ZDE SE URČUJE VELIKOST GIFU: PŘESNĚ JAKO LIŠTA */
    width: calc(100% - 7mm); 
    height: auto; 
    border-radius: 15px;
  }

  /* SPODNÍ OBRÁZKOVÉ TLAČÍTKO (Nahrává tlacitko.png) */
  .bottom-bar {
    display: flex;
    justify-content: center;
    padding-bottom: 30px;
    background: #FFFFFF;
    width: 100%;
  }
  
  .bottom-bar img {
    height: 55px; 
    width: auto;
    cursor: pointer;
  }
</style>
</head>
<body onclick="requestFullScreen()">

<div class="top-bar">
  <div class="back-arrow">
    <span class="material-icons">arrow_back</span>
  </div>

  <div class="status">
    <div class="dot"></div>
    PLATNÝ
  </div>

  <div class="time" id="clock"></div>
</div>

<div class="main-content">
  <img src="karta.gif" alt="Průkaz">
</div>

<div class="bottom-bar">
  <a href="#">
    <img src="tlacitko.png" alt="Přepínač">
  </a>
</div>
