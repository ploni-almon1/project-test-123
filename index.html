<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-touch-fullscreen" content="yes">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

<meta name="robots" content="noindex, nofollow">

<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="ikona.png">

<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400&family=Montserrat:wght@400&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

<style>
  body {
    margin: 0;
    padding: 0;
    background: #FFFFFF; /* Čisté bílé pozadí */
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
    display: flex;
    flex-direction: column;
  }

  /* UPRAVENÁ LIŠTA - rozměry v cm a mm s ošetřením výřezu */
  .top-bar {
    background: #120F1D;
    color: white;
    display: flex;
    align-items: center;
    padding: 12px 15px;
    border-radius: 8px; /* Zaoblené rohy */
    
    /* Vzdálenosti */
    margin-top: calc(1.1cm + env(safe-area-inset-top, 0px)); /* 1,1 cm shora */
    margin-left: 3.5mm; /* 3,5 mm zleva */
    margin-right: 3.5mm; /* 3,5 mm zprava */
    margin-bottom: 6mm; /* 6 mm mezera */
    
    box-sizing: border-box;
  }

  .back-arrow {
    margin-right: 14px;
    display: flex;
    align-items: center;
  }

  .material-icons {
    font-size: 24px;
    color: white;
  }

  .status {
    display: flex;
    align-items: center;
    font-family: 'Roboto', sans-serif;
    font-weight: 400;
    font-size: 14px;
  }

  .dot {
    width: 12px;
    height: 12px;
    background: #008001;
    border-radius: 50%;
    margin-right: 8px;
  }

  .time {
    margin-left: auto;
    white-space: nowrap;
    font-family: 'Montserrat', sans-serif;
    font-weight: 400; 
    font-size: 15px; 
    font-variant-numeric: proportional-nums;
    font-feature-settings: "tnum" 0, "kern" 0;
  }

  .dash {
    display: inline-block;
    transform: scaleX(1.5);
    margin: 0 2px;
  }

  .separator {
    margin: 0 6px;
    font-weight: 400;
  }

  /* UPRAVENÝ PROSTOR PRO GIF - Karta bez stínů a vodoznaků */
  .main-content {
    flex-grow: 1;
    display: flex;
    justify-content: center;
    align-items: flex-start; /* Přimáčknout nahoru k mezeře */
    
    /* Vzdálenosti zleva a zprava - PŘESNĚ 3.5mm */
    padding-left: 3.5mm;
    padding-right: 3.5mm;
    box-sizing: border-box;
    width: 100%;
    background: transparent; /* Odstraněno šedé pole a stíny */
  }
  
  .main-content img {
    width: 100%; /* Plná šířka obsahu, karta bude stejně široká jako lišta */
    height: auto; /* Poměr stran GIFu */
    max-height: 75vh; /* Omezení výšky */
    object-fit: contain;
    border-radius: 15px;
    /* ŽÁDNÝ STÍN!box-shadow: 0 4px 10px rgba(0,0,0,0.1); */
  }

  /* SPODNÍ PŘEPÍNAČ - PŘESNÉ PŘEVZETÍ Z OBRÁZKU */
  .switcher-bar {
    display: flex;
    justify-content: center;
    position: fixed; /* Plovoucí */
    bottom: 25px; /* Nad navigační lištou */
    left: 0;
    right: 0;
    width: 100%;
    z-index: 100;
  }

  .switcher-group {
    display: flex;
    background: rgba(245, 245, 250, 0.9); /* Světlejší podklad s průhledností */
    border: 1px solid rgba(220, 220, 230, 0.8);
    border-radius: 25px; /* Zaoblená skupina */
    padding: 6px;
    align-items: center;
    box-shadow: 0 2px 5px rgba(0,0,0,0.05); /* Jemný stín skupiny */
  }

  /* Tlačítko s ikonou '@' - Levý purpurový puntík */
  .switcher-left {
    width: 40px;
    height: 40px;
    background-color: #6C5CE7; /* Purpurová barva z obrázku */
    border-radius: 50%; /* Kolećko */
    display: flex;
    justify-content: center;
    align-items: center;
    margin-right: 12px;
    color: white;
    font-size: 20px;
    font-family: 'Roboto', sans-serif;
    font-weight: bold;
  }

  /* Tlačítko pro kartu s ikonou '<->' - Pravé obrysové */
  .switcher-right {
    width: 50px;
    height: 40px;
    background-color: #FFFFFF; /* Bílé */
    border: 2px solid #E0E0E0; /* Šedý obrys */
    border-radius: 10px; /* Mírně zaoblený obdélník */
    display: flex;
    justify-content: center;
    align-items: center;
    color: #A0A0A0; /* Šedá ikona */
    font-size: 24px;
  }
</style>
</head>
<body onclick="requestFullScreen()">

<div class="top-bar">
  <div class="back-arrow">
    <span class="material-icons">arrow_back</span>
  </div>

  <div class="status">
    <div class="dot"></div>
    PLATNÝ
  </div>

  <div class="time" id="clock"></div>
</div>

<div class="main-content">
  <img src="karta.gif" alt="Průkaz">
</div>

<div class="switcher-bar">
  <div class="switcher-group">
    <div class="switcher-left">@</div>
    <div class="switcher-right">
      <span class="material-icons" style="color: #6C5CE7;">swap_horiz</span> </div>
  </div>
</div>

<script>
  function requestFullScreen() {
    var el = document.documentElement;
    var rfs = el.requestFullscreen || el.webkitRequestFullScreen || el.mozRequestFullScreen || el.msRequestFullscreen;
    if(typeof rfs!="undefined" && rfs){
      rfs.call(el);
    }
  }

  function updateClock() {
    const now = new Date();
    const day = String(now.getDate()).padStart(2, '0');
    const month = String(now.getMonth() + 1).padStart(2, '0');
    const year = now.getFullYear();
    const hours = String(now.getHours()).padStart(2, '0');
    const minutes = String(now.getMinutes()).padStart(2, '0');
    const seconds = String(now.getSeconds()).padStart(2, '0');

    const clockElement = document.getElementById("clock");
    if (clockElement) {
      const d = '<span class="dash">-</span>';
      clockElement.innerHTML = day + d + month + d + year + '<span class="separator">|</span>' + hours + ":" + minutes + ":" + seconds;
    }
  }

  updateClock(); 
  setInterval(updateClock, 1000); 
</script>

</body>
</html>
